<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OTT Auto Skip</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="popup-root">
      <header class="header">
        <div class="logo-container">
          <img src="../../images/icons/icon-48.png" alt="Logo" class="logo" onerror="this.src='/icons/icon-48.png'" />
        </div>
        <h1 data-i18n="popupTitle">OTT Auto Skip</h1>
      </header>

      <p id="popup-status" class="status-text"></p>

      <section class="toggle-list" aria-label="skip settings">
        <div class="toggle-master-card">
          <label class="toggle-item master" for="toggle-master">
            <span data-i18n="toggleMaster">Enable Auto Skip</span>
            <div class="switch">
              <input id="toggle-master" type="checkbox" />
              <span class="slider"></span>
            </div>
          </label>
        </div>

        <div class="divider"></div>

        <label class="toggle-item" for="toggle-intro">
          <span data-i18n="toggleIntro">Skip Intro</span>
          <div class="switch small">
            <input id="toggle-intro" type="checkbox" />
            <span class="slider"></span>
          </div>
        </label>

        <label class="toggle-item" for="toggle-recap">
          <span data-i18n="toggleRecap">Skip Recap</span>
          <div class="switch small">
            <input id="toggle-recap" type="checkbox" />
            <span class="slider"></span>
          </div>
        </label>

        <label class="toggle-item" for="toggle-next-episode">
          <span data-i18n="toggleNextEpisode">Auto Click Next Episode</span>
          <div class="switch small">
            <input id="toggle-next-episode" type="checkbox" />
            <span class="slider"></span>
          </div>
        </label>
      </section>

      <footer class="footer">
        <a href="#" id="options-link" class="options-link" data-i18n="openOptions">Options</a>
      </footer>
    </main>
    <script type="module" src="./main.js"></script>
  </body>
</html>
