<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Border Gradient -->
    <linearGradient id="bg-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b026ff" stop-opacity="1"/>
      <stop offset="50%" stop-color="#4e65ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00efff" stop-opacity="1"/>
    </linearGradient>
    
    <!-- Primary Gradient for Paths -->
    <linearGradient id="primary-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b026ff" />
      <stop offset="50%" stop-color="#4e65ff" />
      <stop offset="100%" stop-color="#00efff" />
    </linearGradient>

    <!-- Subtle Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Dark Premium Background -->
  <rect width="512" height="512" rx="112" fill="#15161A" />
  
  <!-- Glowing Border -->
  <rect x="8" y="8" width="496" height="496" rx="104" fill="none" stroke="url(#bg-glow)" stroke-width="4" filter="url(#glow)" opacity="0.6"/>
  <rect x="8" y="8" width="496" height="496" rx="104" fill="none" stroke="url(#bg-glow)" stroke-width="2" />

  <!-- Icons Group -->
  <g filter="url(#glow)">
    <!-- Play Triangle -->
    <path d="M 120 170 L 220 256 L 120 342 Z" fill="none" stroke="url(#primary-gradient)" stroke-width="44" stroke-linejoin="round" stroke-linecap="round" />
    
    <!-- First Chevron -->
    <path d="M 250 170 L 330 256 L 250 342" fill="none" stroke="url(#primary-gradient)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Second Chevron -->
    <path d="M 360 170 L 440 256 L 360 342" fill="none" stroke="url(#primary-gradient)" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
